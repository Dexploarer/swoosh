# Swoosh Xcode Project — Generated by XcodeGen
# Run: xcodegen generate
# This creates Swoosh.xcodeproj with the main app + widget extension.

name: Swoosh
options:
  bundleIdPrefix: ai.swoosh
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.$(PRODUCT_NAME:rfc1034identifier)
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: false

packages:
  Swoosh:
    path: .

targets:
  # ═══════════════════════════════════════════════════════════
  # Main App
  # ═══════════════════════════════════════════════════════════
  Swoosh:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: Swoosh
        product: SwooshUI
      - package: Swoosh
        product: SwooshKit
      - package: Swoosh
        product: SwooshSecrets
      - package: Swoosh
        product: SwooshWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.app
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_CFBundleDisplayName: Swoosh
    entitlements:
      path: App/Swoosh.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.ai.swoosh.shared

  # ═══════════════════════════════════════════════════════════
  # Widget Extension
  # ═══════════════════════════════════════════════════════════
  SwooshWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetExtension
    dependencies:
      - package: Swoosh
        product: SwooshWidgets
      - package: Swoosh
        product: SwooshSecrets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.app.widgets
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Swoosh Widgets
        INFOPLIST_KEY_NSExtension: 
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WidgetExtension/SwooshWidgetExtension.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.ai.swoosh.shared

schemes:
  Swoosh:
    build:
      targets:
        Swoosh: all
        SwooshWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
