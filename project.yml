# Swoosh Xcode Project — Generated by XcodeGen
# Run: xcodegen generate
# Produces Swoosh.xcodeproj containing:
#   • Swoosh                  (macOS menu-bar app)
#   • SwooshWidgetExtension   (macOS widget extension)
#   • SwooshiOS               (iOS companion app — thin client to swooshd)

name: Swoosh
options:
  bundleIdPrefix: ai.swoosh
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.0"
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.$(PRODUCT_NAME:rfc1034identifier)
    DEVELOPMENT_TEAM: GY5597YK9P
    CODE_SIGN_STYLE: Automatic
    ENABLE_APP_SANDBOX: false

packages:
  Swoosh:
    path: .

targets:
  # ═══════════════════════════════════════════════════════════
  # Main App
  # ═══════════════════════════════════════════════════════════
  Swoosh:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: Swoosh
        product: SwooshUI
      - package: Swoosh
        product: SwooshKit
      - package: Swoosh
        product: SwooshSecrets
      - package: Swoosh
        product: SwooshWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.app
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSMainNibFile: ""
        INFOPLIST_KEY_CFBundleDisplayName: Swoosh
    entitlements:
      path: App/Swoosh.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.ai.swoosh.shared

  # ═══════════════════════════════════════════════════════════
  # Widget Extension
  # ═══════════════════════════════════════════════════════════
  SwooshWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetExtension
    dependencies:
      - package: Swoosh
        product: SwooshWidgets
      - package: Swoosh
        product: SwooshSecrets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.app.widgets
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Swoosh Widgets
        INFOPLIST_KEY_NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WidgetExtension/SwooshWidgetExtension.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.ai.swoosh.shared

  # ═══════════════════════════════════════════════════════════
  # iOS Companion App
  # ═══════════════════════════════════════════════════════════
  # Thin client to swooshd running on the home Mac. Pairs once via a
  # bearer token, then issues chat/audit/approval requests over HTTP.
  # Does NOT embed SwooshKit (the kernel + actantdb supervisor are
  # macOS/Linux-only) — only SwooshClient + the iOS-safe slice of
  # SwooshUI.
  SwooshiOS:
    type: application
    platform: iOS
    sources:
      - path: Apps/SwooshiOS
    dependencies:
      - package: Swoosh
        product: SwooshClient
    info:
      path: Apps/SwooshiOS/Info.plist
      properties:
        CFBundleDisplayName: Swoosh
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Required for any local-network access on iOS 14+. Without
        # NSLocalNetworkUsageDescription the user is never prompted and
        # all reaches to mac.local / 192.168.x.x silently fail.
        NSLocalNetworkUsageDescription: >-
          Swoosh connects to the swooshd daemon running on your Mac so the
          same agent can answer from your phone.
        # Allow-list of Bonjour services we may browse. Used by the
        # future discovery flow; harmless when discovery is off.
        NSBonjourServices:
          - _swoosh._tcp
        # App Transport Security: allow plain `http://` to *.local and
        # RFC1918 addresses (the home-Wi-Fi pairing target). Public hosts
        # still require HTTPS — this is strictly weaker than the default
        # for local-network destinations, not a global exception.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swoosh.app.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SUPPORTS_MACCATALYST: false

schemes:
  Swoosh:
    build:
      targets:
        Swoosh: all
        SwooshWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
  SwooshiOS:
    build:
      targets:
        SwooshiOS: all
    run:
      config: Debug
    test:
      config: Debug
