# Swoosh CI — build, flow-check, and the full test suite.
#
# TOOLCHAIN: this package pins swift-tools-version 6.3 and targets macOS 26 /
# iOS 26 (see Package.swift), which needs Xcode 26 — only present on the
# `macos-26` runner image. If that label is ever unavailable, fall back to a
# self-hosted runner with the right toolchain and change `runs-on:`. The
# `flow-check` job needs no Swift toolchain and runs anywhere.
name: CI

on:
  push:
    branches: [feat/next, main]
  pull_request:
    branches: [main]

# Newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast topology gate — pure bash + grep over the Swift sources, no
  # toolchain needed. Mirrors what the `plumber` subagent runs POST-FLIGHT.
  flow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Flow / topology guard
        run: ./Scripts/check-flow.sh

  # Build + full test suite. The test step goes through the project's
  # required wrapper (Scripts/swift-test-safe.sh), which (a) traps signals
  # and SIGKILLs orphaned swift-test helpers so they can't hold the SwiftPM
  # .build lock, and (b) exports SWOOSH_STORAGE=memory so tests are hermetic
  # (no test touches a real ~/.swoosh/swoosh.db). No provider API keys are
  # present in CI, so the live smoke tests skip themselves.
  test:
    runs-on: macos-26
    # This package is large (≈47 modules + MLX + Sparkle + ~1800 tests). A
    # cold runner needs ~40 min just to build+test, so 40 hit the cap. Give it
    # headroom; the SwiftPM cache below makes warm runs much faster.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ runner.os }}-xcode26-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode26-

      - name: Select newest installed Xcode
        run: |
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version || true
          swift --version

      # `--build-tests` compiles the modules AND all ~23 test targets in one
      # pass, so the cache (saved after this job) covers test-target artifacts.
      # The Test step then reuses them instead of recompiling the test bundle
      # from scratch — the single biggest warm-run win for this package.
      - name: Build (incl. tests)
        run: swift build --build-tests

      # Tests are already built above, so this is mostly execution.
      # `--num-workers 1` serializes swift-testing: the plugin-executor tests
      # spawn sandbox-exec subprocesses, and running many concurrently starves
      # the cooperative test pool into a deadlock. Per-suite `.serialized`
      # wasn't sufficient, so we bound workers here. (Root cause — the
      # executor's subprocess/pipe wait — is a separate follow-up.)
      - name: Test (hermetic, orphan-safe wrapper, serialized)
        run: ./Scripts/swift-test-safe.sh --parallel --num-workers 1
