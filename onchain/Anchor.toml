[toolchain]
anchor_version = "0.30.1"
solana_version = "2.3.13"

[features]
resolution = true
skip-lint = false

[programs.mainnet]
swoosh_protocol = "11111111111111111111111111111112"
dtour_vault = "11111111111111111111111111111112"

[programs.devnet]
swoosh_protocol = "11111111111111111111111111111112"
dtour_vault = "11111111111111111111111111111112"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = ["programs/*"]

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
